<div class="main-wrapper">
  <div class="inventory-card">
    <div class="table-header">
      <div style="color: black">
        <h1>💊 Inventario PharmaSale</h1>
        <span class="subtitle">Gestión y control de medicamentos disponibles</span>
      </div>

      <div class="header-actions">
        <mat-form-field appearance="outline" class="search-field">
          <mat-icon matPrefix>search</mat-icon>
          <input matInput (keyup)="applyFilter($event)" placeholder="Buscar productos..." />
        </mat-form-field>

        <button mat-flat-button class="btn-action export">
          <mat-icon>file_download</mat-icon> Exportar
        </button>

        <button mat-flat-button class="btn-action create">
          <mat-icon>add</mat-icon> Crear Venta
        </button>
      </div>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort>
        <ng-container matColumnDef="select">
          <th mat-header-cell *matHeaderCellDef>
            <mat-checkbox
              (change)="$event ? masterToggle() : null"
              [checked]="selection.hasValue() && isAllSelected()"
              [indeterminate]="selection.hasValue() && !isAllSelected()"
            >
            </mat-checkbox>
          </th>
          <td mat-cell *matCellDef="let row">
            <mat-checkbox
              (click)="$event.stopPropagation()"
              (change)="$event ? selection.toggle(row) : null"
              [checked]="selection.isSelected(row)"
            >
            </mat-checkbox>
          </td>
        </ng-container>

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
          <td mat-cell *matCellDef="let m">
            <strong>{{ m.id }}</strong>
          </td>
        </ng-container>

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
          <td mat-cell *matCellDef="let m">{{ m.nombre }}</td>
        </ng-container>

        <ng-container matColumnDef="sku">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>SKU</th>
          <td mat-cell *matCellDef="let m">{{ m.sku }}</td>
        </ng-container>

        <ng-container matColumnDef="lote">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nº Lote</th>
          <td mat-cell *matCellDef="let m">{{ m.lote }}</td>
        </ng-container>

        <ng-container matColumnDef="cantidad">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Cantidad</th>
          <td mat-cell *matCellDef="let m">
            <span class="stock-badge">{{ m.cantidad }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="precioUnitario">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Precio U.</th>
          <td mat-cell *matCellDef="let m">$ {{ m.precioUnitario }}</td>
        </ng-container>

        <ng-container matColumnDef="precioTotal">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Total</th>
          <td mat-cell *matCellDef="let m">
            <strong>$ {{ m.precioTotal }}</strong>
          </td>
        </ng-container>

        <ng-container matColumnDef="vencimiento">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Vencimiento</th>
          <td mat-cell *matCellDef="let m">{{ m.vencimiento }}</td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let m">
            <div class="actions-container">
              <button mat-icon-button class="view"><mat-icon>visibility</mat-icon></button>
              <button mat-icon-button class="edit"><mat-icon>edit</mat-icon></button>
              <button mat-icon-button class="delete"><mat-icon>delete</mat-icon></button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
    <mat-paginator
      [pageSize]="10"
      [pageSizeOptions]="[10, 20, 50]"
      showFirstLastButtons
    ></mat-paginator>
  </div>
</div>
