<app-spinner></app-spinner>
<app-alert-modal></app-alert-modal>

<div class="app-container">
  <aside class="sidebar" *ngIf="showSidebar">
    <div class="brand">BOTICA PRO</div>
    <nav class="menu">
      <a routerLink="/dashboard" routerLinkActive="active" class="menu-item">
        <fa-icon [icon]="iconHome"></fa-icon> Inicio
      </a>
      <a routerLink="/inventario" routerLinkActive="active" class="menu-item">
        <fa-icon [icon]="iconBox"></fa-icon> Inventario
      </a>
      <a routerLink="/perfil" routerLinkActive="active" class="menu-item">
        <fa-icon [icon]="iconProfile"></fa-icon> Mi Perfil
      </a>
    </nav>
    <button class="btn-logout" (click)="onLogout()">
      <fa-icon [icon]="iconLogout"></fa-icon> Cerrar Sesión
    </button>
  </aside>

  <nav class="mobile-nav" *ngIf="showSidebar">
    <a routerLink="/dashboard" routerLinkActive="active" class="mobile-item">
      <fa-icon [icon]="iconHome"></fa-icon>
      <span>Inicio</span>
    </a>
    <a routerLink="/inventario" routerLinkActive="active" class="mobile-item">
      <fa-icon [icon]="iconBox"></fa-icon>
      <span>Inventario</span>
    </a>
    <a routerLink="/perfil" routerLinkActive="active" class="mobile-item">
      <fa-icon [icon]="iconProfile"></fa-icon>
      <span>Perfil</span>
    </a>
    <a class="mobile-item" (click)="onLogout()">
      <fa-icon [icon]="iconLogout"></fa-icon>
      <span>Salir</span>
    </a>
  </nav>

  <main [class.content]="showSidebar" [class.login-container]="!showSidebar">
    <router-outlet></router-outlet>
  </main>
</div>
