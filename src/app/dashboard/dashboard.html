<div class="dashboard-container">
  <aside class="sidebar">
    <div class="brand">
      <fa-icon [icon]="iconoBotica"></fa-icon> <span>BOTICA PRO</span>
    </div>
    <nav class="menu">
      <a class="menu-item active"><fa-icon [icon]="iconHome"></fa-icon> <span>Inicio</span></a>
      <a class="menu-item"><fa-icon [icon]="iconBox"></fa-icon> <span>Inventario</span></a>
      <a class="menu-item"><fa-icon [icon]="iconProfile"></fa-icon> <span>Mi Perfil</span></a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" (click)="onLogout()">
        <fa-icon [icon]="iconLogout"></fa-icon> <span>Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <main class="content"> 
    <header class="top-bar">
      <h2>Panel de Control</h2>
      <div class="user-pill">Administrador</div>
    </header>

    <section class="stats-grid">
      <div class="stat-card"><h3>Productos</h3><p>1,284</p></div>
      <div class="stat-card"><h3>Ventas Hoy</h3><p>S/ 450.00</p></div>
      <div class="stat-card"><h3>Alertas</h3><p>3 pendientes</p></div>
    </section>

    <div class="main-content-card">
      <h3>Actividad Reciente</h3>
      <div class="activity-placeholder">No hay movimientos recientes.</div>
    </div>
  </main>
</div>
